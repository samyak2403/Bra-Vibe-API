name: Bra Discount Scraper Bot

on:
  schedule:
    # Runs at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper
        run: python src/bras_scraper.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "bras-vibe-api"
          git config --global user.email "bras-vibe-api@users.noreply.github.com"
          git add data/bras_deals.json data/premium_bras.json data/all_bras.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Bra deals $(date +'%Y-%m-%d')" && git push)

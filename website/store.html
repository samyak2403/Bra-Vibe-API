<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Catalog | Bra Vibe API</title>
    <meta name="description" content="Browse the full catalog of normalized lingerie deals from Bra Vibe API.">

    <link rel="stylesheet" href="style.css">
    <style>
        .store-header {
            padding: 8rem 0 4rem;
            text-align: center;
        }

        .store-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .filters-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-accent);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--trans);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(236, 72, 153, 0.1);
            color: var(--accent-pink);
            border-color: var(--accent-pink);
        }

        .stats-bar {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <div class="container">
            <div class="logo">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
                <a href="index.html" style="color: inherit; text-decoration: none;">Bra Vibe API</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="store.html" style="color: var(--accent-pink);">Store</a>
                <a href="docs.html">Documentation</a>
                <a href="https://github.com/samyak2403/Bra-Vibe-API" target="_blank">GitHub</a>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="store-header">
        <div class="container">
            <h1>Complete <span class="gradient-text">Bra Catalog</span></h1>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Browse all aggregated bras across
                major Indian e-commerce stores in one unified view.</p>
        </div>
    </header>

    <!-- Catalog Section -->
    <section id="catalog" style="padding-top: 0;">
        <div class="container">
            <div class="filters-bar" id="filters">
                <button class="filter-btn active" data-filter="all">All Deals</button>
                <button class="filter-btn" data-filter="premium">Premium Deals</button>
            </div>

            <div class="stats-bar" id="stats">
                Loading database...
            </div>

            <div class="deals-grid" id="store-container">
                <!-- Data will be injected here by store.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Bra Vibe API. Built for Educational Purposes Only.</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem;">Source Code on <a
                    href="https://github.com/samyak2403/Bra-Vibe-API"
                    style="color: var(--accent-pink); text-decoration: none;">GitHub</a></p>
        </div>
    </footer>

    <script src="store.js"></script>
</body>

</html>
